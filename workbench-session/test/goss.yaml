file:
  /usr/local/bin/jupyter:
    exists: true
  /opt/rstudio-drivers:
    exists: true
    filetype: directory
  /etc/rstudio/vscode.extensions.conf:
    exists: true
  /etc/rstudio/positron.extensions.conf:
    exists: true
  /opt:
    exists: true
    filetype: directory

command:
  "echo '{ \"cells\": [], \"metadata\": {}, \"nbformat\": 4, \"nbformat_minor\": 2}' | /opt/python/jupyter/bin/jupyter nbconvert --to notebook --stdin --stdout":
    title: jupyter_works
    timeout: 60000
    exit-status: 0

# Ensure correct R version
  "/opt/R/{{.Env.R_VERSION}}/bin/R --version":
    title: r_version_match
    exit-status: 0
    stdout: [
      "{{.Env.R_VERSION}}"
    ]

# Ensure correct python version
  "/opt/python/{{.Env.PYTHON_VERSION}}/bin/python3 --version":
    title: python_version_matches
    exit-status: 0
    stdout: [
      "{{ .Env.PYTHON_VERSION }}"
    ]

  "python3 --version":
    title: python_in_path_var
    exit-status: 0
    stdout: [
      "{{ .Env.PYTHON_VERSION }}"
    ]

  "jupyter --version":
    title: jupyter_in_path_var
    timeout: 60000
    exit-status: 0
  
  "pip --version":
    title: pip_installed
    exit-status: 0

  "find /opt -type f -not -perm -004 -print 2>&1 | head -c1 | (! grep -q .)":
    title: opt-files-other-read
    exit-status: 0

  "find /opt -type d -not -perm -005 -print 2>&1 | head -c1 | (! grep -q .)":
    title: opt-dirs-other-rx
    exit-status: 0

# Ensure libnss_pwb multiarch symlink is present (dangling at build time; populated at runtime by workbench-session-init)
  "readlink /usr/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH)/libnss_pwb.so.2":
    title: nss_pwb_symlink_exists
    exit-status: 0
    stdout:
      - "/usr/lib/rstudio-server/bin/jammy/libnss_pwb.so"

# Ensure nsswitch.conf has pwb after files for passwd, group, and shadow
  "grep -cE '^(passwd|group|shadow):.*\\bfiles\\b.*\\bpwb\\b' /etc/nsswitch.conf":
    title: nsswitch_has_pwb_entries
    exit-status: 0
    stdout:
      - "3"

# Ensure user resolution falls through gracefully even with the dangling symlink
  "getent passwd root":
    title: nss_graceful_fallthrough
    exit-status: 0
    stdout:
      - "root:"
