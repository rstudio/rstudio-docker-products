file:
  /opt/positron/:
    exists: true
    mode: "0755"
    filetype: directory
  /opt/positron/bin/positron-server/bundled:
    exists: true
    filetype: directory
  /opt/positron/docs/positron:
    exists: true
    filetype: directory
  /usr/local/bin/positron-session-init:
    exists: true
    filetype: file
    mode: "0755"

command:
  positron-files-other-read:
    exec: 'find /opt/positron -type f -not -perm -004 -print 2>&1 | head -c1 | (! grep -q .)'
    exit-status: 0
  positron-dirs-other-rx:
    exec: 'find /opt/positron -type d -not -perm -005 -print 2>&1 | head -c1 | (! grep -q .)'
    exit-status: 0
